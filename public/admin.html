<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek API Service - 管理面板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 18px; margin-bottom: 16px; color: #f1f5f9; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 8px; border-bottom: 2px solid #334155; color: #94a3b8; font-weight: 600; }
  td { padding: 10px 8px; border-bottom: 1px solid #1e293b; }
  tr:hover td { background: #33415522; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #065f46; color: #6ee7b7; }
  .badge-yellow { background: #713f12; color: #fcd34d; }
  .badge-red { background: #7f1d1d; color: #fca5a5; }
  input, button { padding: 10px 16px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 14px; }
  input:focus { outline: none; border-color: #6366f1; }
  button { background: #6366f1; border-color: #6366f1; cursor: pointer; font-weight: 600; }
  button:hover { background: #5558e6; }
  button.secondary { background: transparent; border-color: #475569; color: #94a3b8; }
  .form-row { display: flex; gap: 12px; align-items: end; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 13px; color: #94a3b8; }
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 999; animation: slideIn 0.3s ease; }
  .toast-success { background: #065f46; color: #6ee7b7; }
  .toast-error { background: #7f1d1d; color: #fca5a5; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .code-block { background: #0f172a; padding: 12px 16px; border-radius: 8px; font-family: "Fira Code", monospace; font-size: 13px; word-break: break-all; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .stat-item { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; }
  .stat-item .label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
  .stat-item .value { font-size: 28px; font-weight: 700; color: #f1f5f9; }
  .login-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 100; }
  .login-box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 360px; text-align: center; }
  .login-box h2 { margin-bottom: 24px; }
  .login-box input { width: 100%; margin-bottom: 12px; }
  .login-box button { width: 100%; }
  .hidden { display: none !important; }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #94a3b8; border: 1px solid transparent; }
  .tab.active { background: #6366f1; color: white; }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 管理面板</h2>
    <p style="color:#94a3b8;margin-bottom:20px;font-size:14px">输入管理员密码进入</p>
    <input type="password" id="adminPassword" placeholder="管理员密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">进入</button>
  </div>
</div>

<div class="container hidden" id="mainContent">
  <h1>🚀 DeepSeek API Service</h1>
  <p class="subtitle">管理面板 — 查看用户、用量统计、充值</p>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('users')">👥 用户管理</div>
    <div class="tab" onclick="switchTab('usage')">📊 用量统计</div>
    <div class="tab" onclick="switchTab('orders')">💳 订单审核</div>
    <div class="tab" onclick="switchTab('invites')">🎫 邀请码</div>
  </div>

  <div id="tabUsers">
    <div class="card">
      <h2>➕ 为用户充值</h2>
      <div class="form-row">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="rechargeUser" placeholder="输入用户名">
        </div>
        <div class="form-group">
          <label>充值点数</label>
          <input type="number" id="rechargePoints" placeholder="100" min="1" value="100">
        </div>
        <button onclick="recharge()">💰 确认充值</button>
      </div>
    </div>

    <div class="card">
      <h2>👥 所有用户</h2>
      <table id="userTable">
        <thead><tr><th>用户名</th><th>API Key</th><th>余额(点)</th><th>注册时间</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="tabUsage" class="hidden">
    <div class="card">
      <h2>📊 用量汇总</h2>
      <table id="usageTable">
        <thead><tr><th>用户名</th><th>端点</th><th>调用次数</th><th>Prompt Tokens</th><th>Completion Tokens</th><th>消耗点数</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="tabOrders" class="hidden">
    <div class="card">
      <h2>✅ 待审核订单</h2>
      <p style="color:#94a3b8;font-size:13px;margin-bottom:16px">用户线下转账后提交的凭证，审核通过后点数自动到账</p>
      <table id="pendingOrdersTable">
        <thead><tr><th>订单号</th><th>用户</th><th>套餐</th><th>金额</th><th>点数</th><th>交易单号</th><th>备注</th><th>时间</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="tabInvites" class="hidden">
    <div class="card">
      <h2>🎫 生成邀请码</h2>
      <div class="form-row">
        <div class="form-group">
          <label>最大使用次数</label>
          <input type="number" id="inviteMaxUses" placeholder="1" min="1" max="1000" value="1">
        </div>
        <div class="form-group" style="flex:1">
          <label>备注（可选）</label>
          <input type="text" id="inviteNote" placeholder="例如：给张三的邀请码" style="width:100%">
        </div>
        <button onclick="createInvite()">🎫 生成邀请码</button>
      </div>
    </div>

    <div class="card">
      <h2>📋 所有邀请码</h2>
      <table id="inviteTable">
        <thead><tr><th>邀请码</th><th>最大使用</th><th>已使用</th><th>状态</th><th>备注</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script>
let ADMIN_KEY = '';

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function login() {
  const pw = document.getElementById('adminPassword').value;
  ADMIN_KEY = pw;
  fetch('/api/admin/stats', { headers: { 'x-admin-key': pw } })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        renderStats(data.data);
        renderUsers(data.data.users);
        renderUsage(data.data.usage_stats);
      } else {
        toast('密码错误', 'error');
      }
    })
    .catch(() => toast('连接失败，请检查服务是否启动', 'error'));
}

function refreshData() {
  fetch('/api/admin/stats', { headers: { 'x-admin-key': ADMIN_KEY } })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        renderStats(data.data);
        renderUsers(data.data.users);
        renderUsage(data.data.usage_stats);
      }
    });
}

function renderStats(data) {
  const totalUsers = data.users.length;
  const totalCalls = data.usage_stats.reduce((s, u) => s + u.calls, 0);
  const totalPoints = data.usage_stats.reduce((s, u) => s + u.total_cost, 0);
  const userBalances = data.users.reduce((s, u) => s + u.balance, 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-item"><div class="label">总用户数</div><div class="value">${totalUsers}</div></div>
    <div class="stat-item"><div class="label">总调用次数</div><div class="value">${totalCalls}</div></div>
    <div class="stat-item"><div class="label">总消耗点数</div><div class="value">${totalPoints}</div></div>
    <div class="stat-item"><div class="label">用户总余额</div><div class="value">${userBalances}</div></div>
  `;
}

function renderUsers(users) {
  const tbody = document.querySelector('#userTable tbody');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${esc(u.username)}</strong></td>
      <td><span class="code-block" style="font-size:11px;padding:4px 8px;">${esc(u.api_key)}</span></td>
      <td><span class="badge ${u.balance > 100 ? 'badge-green' : u.balance > 0 ? 'badge-yellow' : 'badge-red'}">${u.balance}</span></td>
      <td>${esc(u.created_at)}</td>
    </tr>
  `).join('');
}

function renderUsage(usage) {
  const tbody = document.querySelector('#usageTable tbody');
  if (!usage.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#64748b;padding:40px">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = usage.map(u => `
    <tr>
      <td>${esc(u.username || '-')}</td>
      <td><span class="badge badge-green">${esc(u.endpoint)}</span></td>
      <td>${u.calls}</td>
      <td>${u.total_prompt.toLocaleString()}</td>
      <td>${u.total_completion.toLocaleString()}</td>
      <td><strong>${u.total_cost}</strong></td>
    </tr>
  `).join('');
}

function recharge() {
  const username = document.getElementById('rechargeUser').value.trim();
  const points = parseInt(document.getElementById('rechargePoints').value);
  if (!username || !points || points <= 0) {
    toast('请输入有效的用户名和点数', 'error');
    return;
  }

  fetch('/api/admin/recharge', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify({ username, points }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast(data.message);
        document.getElementById('rechargeUser').value = '';
        refreshData();
      } else {
        toast(data.error, 'error');
      }
    });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('[id^="tab"]').forEach(el => el.classList.add('hidden'));
  const idx = tab === 'users' ? 1 : tab === 'usage' ? 2 : tab === 'orders' ? 3 : 4;
  document.querySelector(`.tab:nth-child(${idx})`).classList.add('active');
  const tabId = tab === 'users' ? 'tabUsers' : tab === 'usage' ? 'tabUsage' : tab === 'orders' ? 'tabOrders' : 'tabInvites';
  document.getElementById(tabId).classList.remove('hidden');
  if (tab === 'invites') refreshInvites();
  if (tab === 'orders') refreshPendingOrders();
}

function createInvite() {
  const maxUses = parseInt(document.getElementById('inviteMaxUses').value) || 1;
  const note = document.getElementById('inviteNote').value.trim();

  fetch('/api/admin/invite-codes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify({ max_uses: maxUses, note }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast(`邀请码已生成: ${data.data.code}`);
        document.getElementById('inviteNote').value = '';
        refreshInvites();
      } else {
        toast(data.error, 'error');
      }
    });
}

function refreshInvites() {
  fetch('/api/admin/invite-codes', { headers: { 'x-admin-key': ADMIN_KEY } })
    .then(r => r.json())
    .then(data => {
      if (data.success) renderInvites(data.data.invite_codes);
    });
}

function renderInvites(codes) {
  const tbody = document.querySelector('#inviteTable tbody');
  if (!codes.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#64748b;padding:40px">暂无邀请码</td></tr>';
    return;
  }
  tbody.innerHTML = codes.map(c => `
    <tr>
      <td><span class="code-block">${esc(c.code)}</span></td>
      <td>${c.max_uses}</td>
      <td>${c.used_count}</td>
      <td><span class="badge ${c.is_active ? 'badge-green' : 'badge-red'}">${c.is_active ? '有效' : '已失效'}</span></td>
      <td>${esc(c.note || '-')}</td>
      <td>${esc(c.created_at)}</td>
      <td>${c.is_active ? `<button class="secondary" onclick="disableInvite('${esc(c.code)}')" style="padding:4px 10px;font-size:12px">禁用</button>` : '-'}</td>
    </tr>
  `).join('');
}

function disableInvite(code) {
  if (!confirm(`确定要禁用邀请码 ${code} 吗？`)) return;
  fetch('/api/admin/invite-codes/disable', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify({ code }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast(`邀请码 ${code} 已禁用`);
        refreshInvites();
      } else {
        toast(data.error, 'error');
      }
    });
}

function refreshPendingOrders() {
  fetch('/api/payments/admin/pending', { headers: { 'x-admin-key': ADMIN_KEY } })
    .then(r => r.json())
    .then(data => {
      if (data.success) renderPendingOrders(data.data.orders);
    });
}

function renderPendingOrders(orders) {
  const tbody = document.querySelector('#pendingOrdersTable tbody');
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#64748b;padding:40px">暂无待审核订单</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td><span style="font-family:monospace;font-size:12px">${esc(o.order_no)}</span></td>
      <td><strong>${esc(o.username)}</strong></td>
      <td>${esc(o.package_id)}</td>
      <td>¥${o.amount}</td>
      <td>${o.points.toLocaleString()}${o.bonus_points > 0 ? ' +' + o.bonus_points.toLocaleString() : ''}</td>
      <td>${esc(o.transaction_id || '-')}</td>
      <td>${esc(o.proof_note || '-')}</td>
      <td>${esc(o.created_at)}</td>
      <td>
        <button onclick="approveOrder('${esc(o.order_no)}')" style="padding:4px 10px;font-size:12px;background:#065f46;border-color:#065f46;margin-right:4px">✅ 确认</button>
        <button onclick="rejectOrder('${esc(o.order_no)}')" class="secondary" style="padding:4px 10px;font-size:12px">❌ 驳回</button>
      </td>
    </tr>
  `).join('');
}

function approveOrder(orderNo) {
  if (!confirm(`确定确认收款，为订单 ${orderNo} 充值吗？`)) return;
  fetch('/api/payments/admin/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify({ order_no: orderNo }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast(data.message);
        refreshPendingOrders();
        refreshData();
      } else {
        toast(data.error, 'error');
      }
    });
}

function rejectOrder(orderNo) {
  if (!confirm(`确定驳回订单 ${orderNo} 吗？用户可重新提交凭证。`)) return;
  fetch('/api/payments/admin/reject', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify({ order_no: orderNo }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast(data.message);
        refreshPendingOrders();
      } else {
        toast(data.error, 'error');
      }
    });
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
</body>
</html>
