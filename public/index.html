<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek API Service</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .hero { text-align: center; max-width: 600px; padding: 40px; }
  h1 { font-size: 36px; margin-bottom: 12px; }
  p { color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
  .endpoints { text-align: left; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; }
  .endpoints h3 { margin-bottom: 16px; font-size: 16px; }
  .ep { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1e293b; }
  .ep:last-child { border-bottom: none; }
  .method { background: #6366f1; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .path { font-family: "Fira Code", monospace; font-size: 14px; }
  .desc { color: #64748b; font-size: 13px; margin-left: auto; }
  .footer { margin-top: 24px; font-size: 13px; color: #475569; }
  a { color: #6366f1; }
</style>
</head>
<body>
<div class="hero">
  <h1>🚀 DeepSeek API Service</h1>
  <p>封装 DeepSeek 大模型能力，提供开箱即用的 AI 写作、翻译、摘要 API</p>
  <div class="endpoints">
    <h3>📡 API 接口</h3>
    <div class="ep"><span class="method">POST</span><span class="path">/api/writer</span><span class="desc">AI写作</span></div>
    <div class="ep"><span class="method">POST</span><span class="path">/api/translator</span><span class="desc">中英互译</span></div>
    <div class="ep"><span class="method">POST</span><span class="path">/api/summary</span><span class="desc">文本摘要</span></div>
    <div class="ep"><span class="method">GET</span><span class="path">/api/me</span><span class="desc">查询余额</span></div>
    <div class="ep"><span class="method">POST</span><span class="path">/api/payments/create-order</span><span class="desc">充值下单</span></div>
	    <div class="ep"><span class="method">POST</span><span class="path">/api/register</span><span class="desc">注册账号</span></div>
  </div>
  <p class="footer">
    <a href="/recharge">💰 在线充值</a> &nbsp;|&nbsp; 管理面板: <a href="/admin">/admin</a> &nbsp;|&nbsp; 健康检查: <a href="/api/health">/api/health</a>
  </p>
</div>
</body>
</html>
